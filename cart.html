<!DOCTYPE html>
<html>
<head>
    <title>Cart - KolkataKraft</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #fef9f4, #f7e8e8);
            font-family: Arial;
        }

        .navbar-custom {
            background-color: #a8dadc;
        }

        .navbar-custom a {
            color: #333;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        .cart-box {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-custom {
            background-color: #f4a261;
            color: white;
            width: 100%;
        }

        .btn-custom:hover {
            background-color: #e76f51;
        }

        .footer {
            background-color: #a8dadc;
            color: #333;
            text-align: center;
            padding: 15px;
            margin-top: 30px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar-custom text-center p-3">
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="cart.html">Cart</a>
    <a href="enquiry.html">Enquiry</a>
    <a href="analytics.html">Analytics</a>
    <a href="login.html">Login</a>
</div>

<!-- CART SECTION -->
<div class="cart-box">

    <h3 class="text-center">Your Cart</h3>

    <ul id="cartList" class="list-group mb-3"></ul>

    <h5 class="text-center">Total: ₹<span id="total">0</span></h5>

    <a href="payment.html">
        <button class="btn btn-custom mt-3">Proceed to Payment</button>
    </a>

</div>

<!-- FOOTER -->
<div class="footer">
    <p>© 2026 KolkataKraft | Crafted with Love 💛</p>
</div>

<!-- SCRIPT -->
<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;

let cartList = document.getElementById("cartList");

cart.forEach(item => {
    let li = document.createElement("li");
    li.className = "list-group-item";
    li.innerText = item.name + " - ₹" + item.price;
    cartList.appendChild(li);
    total += item.price;
});

document.getElementById("total").innerText = total;
localStorage.setItem("total", total);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
