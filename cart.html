<!DOCTYPE html>
<html>
<head>
    <title>Cart - KolkataKraft</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #fef9f4, #f7e8e8);
            font-family: Arial;
        }

        .navbar-custom {
            background-color: #a8dadc;
        }

        .navbar-custom a {
            color: #333;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        .cart-box {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #ccc;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .cart-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
        }

        .btn-custom {
            background-color: #f4a261;
            color: white;
        }

        .btn-custom:hover {
            background-color: #e76f51;
        }

        .footer {
            background-color: #a8dadc;
            color: #333;
            text-align: center;
            padding: 15px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar-custom text-center p-3">
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="cart.html">Cart</a>
    <a href="enquiry.html">Enquiry</a>
    <a href="analytics.html">Analytics</a>
    <a href="login.html">Login</a>
</div>

<!-- CART BOX -->
<div class="cart-box">
    <h3 class="text-center mb-4">Your Cart</h3>

    <div id="cartItems"></div>

    <h5 class="text-end mt-3">Total: ₹<span id="cartTotal">0</span></h5>

    <div class="text-end mt-3">
        <a href="payment.html" class="btn btn-custom">Proceed to Payment</a>
    </div>
</div>

<!-- FOOTER -->
<div class="footer">
    <p>© 2026 KolkataKraft | Crafted with Love 💛</p>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Load cart from localStorage
    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    const cartItemsDiv = document.getElementById('cartItems');
    const cartTotalSpan = document.getElementById('cartTotal');

    function renderCart() {
        cartItemsDiv.innerHTML = '';
        let total = 0;

        if(cart.length === 0){
            cartItemsDiv.innerHTML = '<p class="text-center">Your cart is empty.</p>';
        }

        cart.forEach((item, index) => {
            total += item.price * item.quantity;

            const div = document.createElement('div');
            div.className = 'cart-item';
            div.innerHTML = `
                <div class="d-flex align-items-center">
                    <img src="${item.image}" alt="${item.name}">
                    <div class="ms-3">
                        <h6>${item.name}</h6>
                        <p>₹${item.price} × ${item.quantity}</p>
                    </div>
                </div>
                <div>
                    <button class="btn btn-sm btn-danger" onclick="removeItem(${index})">Remove</button>
                </div>
            `;
            cartItemsDiv.appendChild(div);
        });

        cartTotalSpan.innerText = total;
    }

    function removeItem(index) {
        cart.splice(index, 1);
        localStorage.setItem('cart', JSON.stringify(cart));
        renderCart();
    }

    renderCart();
</script>

</body>
</html>
