<!DOCTYPE html>
<html>
<head>
    <title>Login - KolkataKraft</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #fef9f4, #f7e8e8);
            font-family: Arial;
        }

        .navbar-custom {
            background-color: #a8dadc;
        }

        .navbar-custom a {
            color: #333;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        .login-box {
            max-width: 400px;
            margin: 60px auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-custom {
            background-color: #f4a261;
            color: white;
            width: 100%;
        }

        .btn-custom:hover {
            background-color: #e76f51;
        }

        .footer {
            background-color: #a8dadc;
            color: #333;
            text-align: center;
            padding: 15px;
            margin-top: 30px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar-custom text-center p-3">
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="cart.html">Cart</a>
    <a href="enquiry.html">Enquiry</a>
    <a href="analytics.html">Analytics</a>
    <a href="login.html">Login</a>
</div>

<!-- LOGIN FORM -->
<div class="login-box">

    <h3 class="text-center mb-3">Login</h3>

    <form onsubmit="return loginUser()">

        <input type="text" id="username" placeholder="Username" class="form-control mb-3" required>

        <input type="password" id="password" placeholder="Password" class="form-control mb-3" required>

        <button type="submit" class="btn btn-custom">Login</button>

    </form>

</div>

<!-- FOOTER -->
<div class="footer">
    <p>© 2026 KolkataKraft | Crafted with Love 💛</p>
</div>

<!-- SCRIPT -->
<script>
function loginUser(){
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if(user === "admin" && pass === "1234"){
        alert("Login Successful!");
        window.location.href = "index.html";
    } else {
        alert("Invalid Username or Password");
    }

    return false;
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
