<!DOCTYPE html>
<html>
<head>
    <title>Login - KolkataKraft</title>
</head>

<body style="font-family:Arial; background:#F5F5DC; text-align:center;">

<h2 style="color:#8B4513;">Login</h2>

<div style="background:white; padding:20px; width:300px; margin:auto; border-radius:10px;">
    
    <input type="text" id="username" placeholder="Enter Username" 
        style="width:90%; padding:10px; margin:10px;"><br>

    <input type="password" id="password" placeholder="Enter Password" 
        style="width:90%; padding:10px; margin:10px;"><br>

    <button onclick="login()" 
        style="padding:10px; background:#8B4513; color:white; border:none;">
        Login
    </button>

</div>

<script src="js/script.js"></script>

</body>
</html>
