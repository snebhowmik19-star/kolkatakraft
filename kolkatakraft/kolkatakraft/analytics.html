<!DOCTYPE html>
<html>
<head>
    <title>Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="font-family:Arial; background:#F5F5DC;">

<h2 style="text-align:center;">Sales Analytics</h2>

<canvas id="myChart" style="max-width:600px; margin:auto;"></canvas>

<script>
let ctx = document.getElementById('myChart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['Saree', 'Kurta', 'Dupatta', 'Dokra'],
        datasets: [{
            label: 'Sales',
            data: [12, 8, 5, 6],
            backgroundColor: ['red','blue','green','orange']
        }]
    }
});
</script>

</body>
</html>
