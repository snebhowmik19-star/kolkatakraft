<!DOCTYPE html>
<html>
<head>
    <title>Payment - KolkataKraft</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #fef9f4, #f7e8e8);
            font-family: Arial;
        }

        .navbar-custom {
            background-color: #a8dadc;
        }

        .navbar-custom a {
            color: #333;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        .payment-box {
            max-width: 400px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-custom {
            background-color: #f4a261;
            color: white;
            width: 100%;
        }

        .btn-custom:hover {
            background-color: #e76f51;
        }

        .footer {
            background-color: #a8dadc;
            color: #333;
            text-align: center;
            padding: 15px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar-custom text-center p-3">
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="cart.html">Cart</a>
    <a href="enquiry.html">Enquiry</a>
    <a href="analytics.html">Analytics</a>
    <a href="login.html">Login</a>
</div>

<!-- PAYMENT BOX -->
<div class="payment-box">

    <h3 class="text-center">Payment</h3>
    <h5 class="text-center">Total: ₹<span id="totalAmount">0</span></h5>
    <hr>

    <h6>Select Payment Method</h6>

    <input type="radio" name="payment" value="card" onclick="showCard()" checked> Card Payment <br>
    <input type="radio" name="payment" value="upi" onclick="showUPI()"> UPI <br>
    <input type="radio" name="payment" value="cod" onclick="showCOD()"> Cash on Delivery <br><br>

    <!-- Card Form -->
    <div id="cardForm">
        <input type="text" placeholder="Name on Card" class="form-control mb-2">
        <input type="text" placeholder="Card Number" class="form-control mb-2">
        <input type="text" placeholder="MM/YY" class="form-control mb-2">
        <input type="password" placeholder="CVV" class="form-control mb-2">
    </div>

    <!-- UPI Form -->
    <div id="upiForm" style="display:none;">
        <input type="text" placeholder="Enter UPI ID" class="form-control mb-2">
    </div>

    <!-- COD Message -->
    <div id="codMsg" style="display:none;">
        <p>Pay when your order is delivered.</p>
    </div>

    <!-- Pay Button -->
    <button onclick="payNow()" class="btn btn-custom mt-2">Pay Now</button>

</div>

<!-- FOOTER -->
<div class="footer">
    <p>© 2026 KolkataKraft | Crafted with Love 💛</p>
</div>

<!-- Razorpay Script -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>

/* Get total safely */
let total = parseInt(localStorage.getItem("total")) || 0;
document.getElementById("totalAmount").innerText = total;

/* Toggle payment forms */
function showCard(){
    document.getElementById("cardForm").style.display = "block";
    document.getElementById("upiForm").style.display = "none";
    document.getElementById("codMsg").style.display = "none";
}

function showUPI(){
    document.getElementById("cardForm").style.display = "none";
    document.getElementById("upiForm").style.display = "block";
    document.getElementById("codMsg").style.display = "none";
}

function showCOD(){
    document.getElementById("cardForm").style.display = "none";
    document.getElementById("upiForm").style.display = "none";
    document.getElementById("codMsg").style.display = "block";
}

/* Payment Function */
function payNow(){

    let selected = document.querySelector('input[name="payment"]:checked').value;

    if(total === 0){
        alert("Your cart is empty!");
        return;
    }

    // COD option
    if(selected === "cod"){
        alert("Order placed successfully! Pay on delivery.");
        localStorage.removeItem("cart");
        localStorage.removeItem("total");
        window.location.href = "index.html";
        return;
    }

    // Razorpay (Card / UPI)
    var options = {
        "key": "rzp_test_1234567890",  // test key
        "amount": total * 100,
        "currency": "INR",
        "name": "KolkataKraft",
        "description": "Order Payment",
        "handler": function (response){
            alert("Payment Successful!");
            localStorage.removeItem("cart");
            localStorage.removeItem("total");
            window.location.href = "index.html";
        }
    };

    var rzp1 = new Razorpay(options);
    rzp1.open();

    rzp1.on('payment.failed', function (){
        alert("Payment Failed! Try again.");
    });
}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
