<!DOCTYPE html>
<html>
<head>
    <title>Payment - KolkataKraft</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #fef9f4, #f7e8e8);
            font-family: Arial;
        }

        .navbar-custom {
            background-color: #a8dadc;
        }

        .navbar-custom a {
            color: #333;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        .payment-box {
            max-width: 400px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-custom {
            background-color: #f4a261;
            color: white;
            width: 100%;
        }

        .btn-custom:hover {
            background-color: #e76f51;
        }

        .footer {
            background-color: #a8dadc;
            color: #333;
            text-align: center;
            padding: 15px;
            margin-top: 30px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar-custom text-center p-3">
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="cart.html">Cart</a>
    <a href="enquiry.html">Enquiry</a>
    <a href="analytics.html">Analytics</a>
    <a href="login.html">Login</a>
</div>

<!-- PAYMENT BOX -->
<div class="payment-box">

    <h3 class="text-center">Payment</h3>
    <h5 class="text-center">Total: ₹<span id="totalAmount">0</span></h5>

    <hr>

    <h6>Select Payment Method</h6>

    <input type="radio" name="payment" id="cardRadio" onclick="showCard()" checked> Card Payment <br>
    <input type="radio" name="payment" id="upiRadio" onclick="showUPI()"> UPI <br>
    <input type="radio" name="payment" id="codRadio" onclick="showCOD()"> Cash on Delivery <br><br>

    <!-- Card -->
    <div id="cardForm">
        <input type="text" placeholder="Name on Card" class="form-control mb-2">
        <input type="text" placeholder="Card Number" class="form-control mb-2">
        <input type="text" placeholder="MM/YY" class="form-control mb-2">
        <input type="password" placeholder="CVV" class="form-control mb-2">
    </div>

    <!-- UPI -->
    <div id="upiForm" style="display:none;">
        <input type="text" placeholder="Enter UPI ID" class="form-control mb-2">
    </div>

    <!-- COD -->
    <div id="codMsg" style="display:none;">
        <p>Pay when your order is delivered.</p>
    </div>

    <!-- BUTTON -->
    <button onclick="payNow()" class="btn btn-custom mt-2">
        Pay Now
    </button>

</div>

<!-- FOOTER -->
<div class="footer">
    <p>© 2026 KolkataKraft | Crafted with Love 💛</p>
</div>

<!-- Razorpay Script -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
/* Show total */
let total = localStorage.getItem("total") || 500;
document.getElementById("totalAmount").innerText = total;

/* Payment toggle functions */
function showCard(){
    document.getElementById("cardForm").style.display = "block";
    document.getElementById("upiForm").style.display = "none";
    document.getElementById("codMsg").style.display = "none";
}

function showUPI(){
    document.getElementById("cardForm").style.display = "none";
    document.getElementById("upiForm").style.display = "block";
    document.getElementById("codMsg").style.display = "none";
}

function showCOD(){
    document.getElementById("cardForm").style.display = "none";
    document.getElementById("upiForm").style.display = "none";
    document.getElementById("codMsg").style.display = "block";
}

/* Main payment function */
function payNow(){
    let selectedPayment = document.querySelector('input[name="payment"]:checked').id;

    if(selectedPayment === "cardRadio" || selectedPayment === "upiRadio"){
        // Razorpay payment
        var options = {
            "key": "rzp_test_yourActualKeyHere", // Replace with your Razorpay test key
            "amount": total * 100, // in paise
            "currency": "INR",
            "name": "KolkataKraft",
            "description": "Order Payment",
            "handler": function (response){
                alert("Payment Successful!");
                localStorage.removeItem("cart");
                window.location.href = "index.html";
            }
        };
        var rzp1 = new Razorpay(options);
        rzp1.open();

        // Optional: handle failure
        rzp1.on('payment.failed', function (response){
            alert("Payment Failed: " + response.error.description);
        });

    } else if(selectedPayment === "codRadio"){
        // Cash on Delivery
        alert("Order placed successfully! Pay when your order is delivered.");
        localStorage.removeItem("cart");
        window.location.href = "index.html";
    }
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
