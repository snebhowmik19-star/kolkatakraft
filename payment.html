<!DOCTYPE html>
<html>
<head>
    <title>Payment - KolkataKraft</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #fef9f4, #f7e8e8);
            font-family: Arial;
        }

        .navbar-custom {
            background-color: #a8dadc;
        }

        .navbar-custom a {
            color: #333;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        .payment-box {
            max-width: 400px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-custom {
            background-color: #f4a261;
            color: white;
            width: 100%;
        }

        .btn-custom:hover {
            background-color: #e76f51;
        }

        .footer {
            background-color: #a8dadc;
            text-align: center;
            padding: 15px;
            margin-top: 30px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar-custom text-center p-3">
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="cart.html">Cart</a>
    <a href="enquiry.html">Enquiry</a>
    <a href="analytics.html">Analytics</a>
    <a href="login.html">Login</a>
</div>

<!-- PAYMENT -->
<div class="payment-box">

    <h3 class="text-center">Payment</h3>
    <h5 class="text-center">Total: ₹<span id="totalAmount">0</span></h5>

    <hr>

    <!-- Options -->
    <h6>Select Payment Method</h6>

    <input type="radio" name="payment" value="online" checked> Card / UPI (Razorpay)<br>
    <input type="radio" name="payment" value="cod"> Cash on Delivery<br><br>

    <!-- BUTTON -->
    <button onclick="payNow()" class="btn btn-custom">
        Proceed Payment
    </button>

</div>

<!-- FOOTER -->
<div class="footer">
    <p>© 2026 KolkataKraft</p>
</div>

<!-- Razorpay -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
let total = localStorage.getItem("total") || 500;
document.getElementById("totalAmount").innerText = total;

function payNow(){

    let method = document.querySelector('input[name="payment"]:checked').value;

    // COD OPTION
    if(method === "cod"){
        alert("Order placed with Cash on Delivery!");
        localStorage.removeItem("cart");
        window.location.href = "index.html";
        return;
    }

    // RAZORPAY (Card + UPI + Netbanking auto supported)
    var options = {
        "key": "rzp_test_1234567890", 
        "amount": total * 100,
        "currency": "INR",
        "name": "KolkataKraft",
        "description": "Order Payment",

        "handler": function (response){
            alert("Payment Successful!");
            localStorage.removeItem("cart");
            window.location.href = "index.html";
        },

        "prefill": {
            "name": "Customer",
            "email": "test@test.com"
        },

        "theme": {
            "color": "#f4a261"
        }
    };

    var rzp = new Razorpay(options);
    rzp.open();
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
