<!DOCTYPE html>
<html>
<head>
    <title>Payment - KolkataKraft</title>

    <!-- ✅ Bootstrap (optional but good for marks) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="margin:0; font-family: Arial; background:#F5F5DC;">

<!-- Navbar -->
<div style="background:#8B4513; padding:15px; text-align:center;">
    <a href="index.html" style="color:white; margin:15px;">Home</a>
    <a href="products.html" style="color:white; margin:15px;">Products</a>
    <a href="cart.html" style="color:white; margin:15px;">Cart</a>
</div>

<h2 style="text-align:center;">Payment</h2>
<h3 style="text-align:center;">
    Total Amount: ₹<span id="totalAmount">500</span>
</h3>

<div style="max-width:400px; margin:auto; background:white; padding:20px; border-radius:10px;">

    <h3>Select Payment Method</h3>

    <input type="radio" name="payment" onclick="showCard()" checked> Card Payment<br>
    <input type="radio" name="payment" onclick="showUPI()"> UPI<br>
    <input type="radio" name="payment" onclick="showCOD()"> Cash on Delivery<br><br>

    <!-- Card -->
    <div id="cardForm">
        <input type="text" placeholder="Name on Card" style="width:100%; margin:5px 0;">
        <input type="text" placeholder="Card Number" style="width:100%; margin:5px 0;">
        <input type="text" placeholder="MM/YY" style="width:100%; margin:5px 0;">
        <input type="password" placeholder="CVV" style="width:100%; margin:5px 0;">
    </div>

    <!-- UPI -->
    <div id="upiForm" style="display:none;">
        <input type="text" placeholder="Enter UPI ID" style="width:100%; margin:5px 0;">
    </div>

    <!-- COD -->
    <div id="codMsg" style="display:none;">
        <p>Pay when delivered.</p>
    </div>

    <!-- ✅ Razorpay Button -->
    <button onclick="payNow()" style="width:100%; padding:10px; background:#8B4513; color:white; border:none; border-radius:5px;">
        Pay with Razorpay
    </button>

</div>

<!-- Razorpay Script -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
// Payment Function
function payNow() {

    var total = document.getElementById("totalAmount").innerText;

    var options = {
        "key": "YOUR_KEY_ID_HERE", // 🔴 Replace with your Razorpay Test Key
        "amount": total * 100,
        "currency": "INR",
        "name": "KolkataKraft",
        "description": "Order Payment",

        "handler": function (response){
            alert("Payment Successful! Payment ID: " + response.razorpay_payment_id);
            window.location.href = "index.html";
        },

        "prefill": {
            "name": "Customer",
            "email": "test@example.com",
            "contact": "9999999999"
        },

        "theme": {
            "color": "#8B4513"
        }
    };

    var rzp1 = new Razorpay(options);
    rzp1.open();
}

// Payment Method Toggle
function showCard() {
    document.getElementById("cardForm").style.display = "block";
    document.getElementById("upiForm").style.display = "none";
    document.getElementById("codMsg").style.display = "none";
}

function showUPI() {
    document.getElementById("cardForm").style.display = "none";
    document.getElementById("upiForm").style.display = "block";
    document.getElementById("codMsg").style.display = "none";
}

function showCOD() {
    document.getElementById("cardForm").style.display = "none";
    document.getElementById("upiForm").style.display = "none";
    document.getElementById("codMsg").style.display = "block";
}
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
