<!-- HEADER -->
<div class="text-center mt-4">
    <h1 style="color:#8B4513;">Welcome to KolkataKraft</h1>
    <p>Handicrafts from West Bengal</p>
</div>

<!-- PRODUCTS -->
<div class="container mt-5">
    <h2 class="text-center mb-4" style="color:#8B4513;">Featured Products</h2>

    <div class="row">

        <!-- Saree -->
        <div class="col-md-4">
            <div class="card shadow mb-4">
                <img src="images/saree.jpg" class="card-img-top" style="height:200px; object-fit:cover;">
                <div class="card-body text-center">
                    <h5>Handloom Saree</h5>
                    <p>₹1200</p>
                    <button class="btn btn-dark" onclick="addToCart('Handloom Saree',1200)">Add to Cart</button>
                </div>
            </div>
        </div>

        <!-- Dokra -->
        <div class="col-md-4">
            <div class="card shadow mb-4">
                <img src="images/dokra art.jpg" class="card-img-top" style="height:200px; object-fit:cover;">
                <div class="card-body text-center">
                    <h5>Dokra Art</h5>
                    <p>₹800</p>
                    <button class="btn btn-dark" onclick="addToCart('Dokra Art',800)">Add to Cart</button>
                </div>
            </div>
        </div>

        <!-- Kantha -->
        <div class="col-md-4">
            <div class="card shadow mb-4">
                <img src="images/kantha stich.jpg" class="card-img-top" style="height:200px; object-fit:cover;">
                <div class="card-body text-center">
                    <h5>Kantha Stitch</h5>
                    <p>₹1500</p>
                    <button class="btn btn-dark" onclick="addToCart('Kantha Stitch',1500)">Add to Cart</button>
                </div>
            </div>
        </div>

        <!-- Kurta -->
        <div class="col-md-4">
            <div class="card shadow mb-4">
                <img src="images/kurta.jpg" class="card-img-top" style="height:200px; object-fit:cover;">
                <div class="card-body text-center">
                    <h5>Traditional Kurta</h5>
                    <p>₹1000</p>
                    <button class="btn btn-dark" onclick="addToCart('Traditional Kurta',1000)">Add to Cart</button>
                </div>
            </div>
        </div>

        <!-- Dupatta -->
        <div class="col-md-4">
            <div class="card shadow mb-4">
                <img src="images/dupatta.jpg" class="card-img-top" style="height:200px; object-fit:cover;">
                <div class="card-body text-center">
                    <h5>Elegant Dupatta</h5>
                    <p>₹600</p>
                    <button class="btn btn-dark" onclick="addToCart('Elegant Dupatta',600)">Add to Cart</button>
                </div>
            </div>
        </div>

    </div>
</div>
